<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login register form</title>
    <style>
        div{
            background-color: white;
            width: 400px;
            
            border-radius: 20px;
            margin-left: 200px;
            padding: 20px;
            border: 1px solid ;
        
        }
        h1{
            color: blue;
            margin-left: 130px;
        }
        input{
            border: 2px solid blue;
            border-radius: 20px;
            width: 250px;
            padding: 8px;
            margin-left: 50px;
        }
        button{
            cursor: pointer;
            margin-left: 40px;
            border-radius: 20px;
            width: 300px;
            padding: 10px;
            background-color: blueviolet;            

        }
        
    </style>
    
</head>
<body>
<div>
    <h1> Register</h1><br><br/>
    <input type="full name" placeholder="Full name"><br><br/>
    <input type="email" placeholder="E-mail"><br><br/>
    <input type="phone" placeholder="Phone"><br><br/>
    <input type="password" placeholder="password"><br><br/>
    <input type="confirm password" placeholder="confirm password"><br><br/><br/><br/>
    <button> Register</button><br><br/>
    <button> Have account ? sign in </button>

</div>
    
</body>
</html>
